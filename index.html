<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream World Japan | Master Guide</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- REQUIRED LIBRARIES -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>
/* YOUR ORIGINAL CSS (UNCHANGED CORE) */
:root {
--primary-orange:#e65c00;
--dark-bg:#050505;
--card-bg:#111;
--text-gray:#aaa;
--light-blue:#e0f2fe;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:var(--dark-bg);color:white;overflow-x:hidden}

/* HEADER */
header{
position:fixed;top:0;width:100%;
padding:15px 5%;
display:flex;justify-content:space-between;
background:rgba(0,0,0,.9);
z-index:1000;
}

.logo span{color:var(--primary-orange)}

/* HERO */
.hero{
height:100vh;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070') center/cover;
}

.hero h1{font-size:clamp(2.5rem,8vw,5rem)}
.hero span{color:var(--primary-orange)}

/* CARDS */
.section-padding{padding:80px 8%}
.grid-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.feature-card{
background:rgba(255,255,255,.03);
padding:40px;
border-radius:20px;
cursor:pointer;
transition:.3s;
opacity:0;
transform:translateY(30px);
}

.feature-card:hover{
transform:translateY(-10px);
border:1px solid var(--primary-orange);
}

/* GUIDE SECTION (BOTTOM) */
.guide-section{
background:var(--light-blue);
padding:100px 20px;
text-align:center;
color:#1a365d;
}

.guide-book{
width:320px;height:480px;
margin:auto;
cursor:pointer;
transform:rotateY(-20deg);
transition:.5s;
}

.guide-book:hover{
transform:rotateY(0) scale(1.05);
}

.guide-cover{
width:100%;height:100%;
background:url('https://files.catbox.moe/7vkp3x.png') center/cover;
border-radius:10px;
}

/* FLIPBOOK MODAL */
.flipbook-modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

#flipbook{width:800px;height:550px}

.page{
background:white;
color:black;
padding:20px;
}

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:orange;
border:none;
padding:15px;
cursor:pointer;
}

#prev-btn{left:10px}
#next-btn{right:10px}

.close-flip{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
color:white;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
}

footer{
padding:40px;
text-align:center;
color:#555;
}
</style>
</head>

<body>

<header>
<div class="logo">DREAM WORLD <span>JAPAN</span></div>
</header>

<section class="hero">
<h1><span>MASTER</span> JAPAN</h1>
</section>

<!-- CARDS -->
<section class="section-padding">
<div class="grid-container">

<div class="feature-card" onclick="openModal('transport')">
<h3>🚆 Transport</h3>
<p>IC Card & JR hacks</p>
</div>

<div class="feature-card" onclick="openModal('food')">
<h3>🍣 Food</h3>
<p>Local tips & etiquette</p>
</div>

</div>
</section>

<!-- GUIDE (BOTTOM EXACTLY AS YOU WANTED) -->
<section class="guide-section">
<h2>Click Book to Open Full Guide</h2>

<div class="guide-book" onclick="openFlipbook()">
<div class="guide-cover"></div>
</div>

</section>

<!-- FLIPBOOK -->
<div class="flipbook-modal" id="flipModal">

<span class="close-flip" onclick="closeFlipbook()">✖</span>

<button class="nav-btn" id="prev-btn">◀</button>
<button class="nav-btn" id="next-btn">▶</button>

<div id="flipbook"></div>

</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
<div class="modal-content">
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<footer>
<p>© 2026 Dream World Japan</p>
</footer>

<script>

/* MODAL */
const details={
transport:{title:"Transport",text:"Use Suica IC Card"},
food:{title:"Food",text:"Get 50% discount after 8PM"}
};

function openModal(type){
infoModal.style.display="flex";
modalTitle.innerText=details[type].title;
modalText.innerText=details[type].text;
}

function closeModal(){
infoModal.style.display="none";
}

/* ANIMATION */
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.style.opacity=1;
e.target.style.transform="translateY(0)";
}
});
});
document.querySelectorAll(".feature-card").forEach(el=>observer.observe(el));

/* FLIPBOOK DATA */
const data=[
{title:"Mental Model",content:"Flow + Respect"},
{title:"Transport",content:"Use IC Cards"},
{title:"Food",content:"Discount Bento"},
{title:"Spots",content:"Hidden Tokyo"}
];

const flipbook=$("#flipbook");

data.forEach(p=>{
flipbook.append(`
<div class="page">
<h2>${p.title}</h2>
<p>${p.content}</p>
</div>
`);
});

/* fill extra pages */
for(let i=data.length;i<30;i++){
flipbook.append(`<div class="page">Notes...</div>`);
}

function openFlipbook(){
flipModal.style.display="flex";

setTimeout(()=>{
$("#flipbook").turn({
width:800,
height:550,
autoCenter:true
});
},200);
}

function closeFlipbook(){
flipModal.style.display="none";
$("#flipbook").turn("destroy");
}

/* controls */
$("#next-btn").click(()=>$("#flipbook").turn("next"));
$("#prev-btn").click(()=>$("#flipbook").turn("previous"));

</script>

</body>
</html>
