<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dream World Japan | Master Guide</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- FIXED jQuery -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>
:root {
    --primary-orange: #e65c00; 
    --dark-bg: #050505;
}

/* ---------- GLOBAL ---------- */
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#050505;
    color:white;
    overflow-x:hidden;
}

/* ---------- HEADER ---------- */
header {
    position:fixed;
    top:0;
    width:100%;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.9);
    z-index:1000;
}

.logo span {color:var(--primary-orange);}

/* ---------- HERO ---------- */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop') center/cover;
}

.hero h1 {font-size:4rem;}
.hero span {color:var(--primary-orange);}

/* ---------- GUIDE SECTION ---------- */
.guide-section {
    padding:100px 20px;
    text-align:center;
    background:#e0f2fe;
    color:black;
}

.guide-book {
    width:280px;
    height:420px;
    margin:auto;
    transform:rotateY(-20deg);
    cursor:pointer;
}

.guide-cover {
    width:100%;
    height:100%;
    background:url('https://files.catbox.moe/7vkp3x.png') center/cover;
    border-radius:10px;
}

/* ---------- FLIPBOOK MODAL ---------- */
.flipbook-modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

#flipbook {
    width:800px;
    height:550px;
}

/* pages */
.page {
    background:white;
    padding:20px;
}

/* buttons */
.nav-btn {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:orange;
    border:none;
    padding:15px;
    cursor:pointer;
}

#prev-btn {left:10px;}
#next-btn {right:10px;}

.close-flip {
    position:absolute;
    top:20px;
    right:30px;
    font-size:30px;
    cursor:pointer;
    color:white;
}
</style>

</head>

<body>

<header>
    <div class="logo">DREAM WORLD <span>JAPAN</span></div>
</header>

<section class="hero">
    <h1><span>MASTER</span> JAPAN</h1>
</section>

<!-- GUIDE -->

<section class="guide-section">
    <h2>Click Book to Open Full Guide</h2>

```
<div class="guide-book" onclick="openFlipbook()">
    <div class="guide-cover"></div>
</div>
```

</section>

<!-- FLIPBOOK -->

<div class="flipbook-modal" id="flipModal">

<span class="close-flip" onclick="closeFlipbook()">✖</span>

<button class="nav-btn" id="prev-btn">◀</button> <button class="nav-btn" id="next-btn">▶</button>

<div id="flipbook"></div>

</div>

<script>
const guideData = [
{title:"MENTAL MODEL",content:"Flow + Respect system 👀"},
{title:"TRANSPORT",content:"Use IC cards like Suica 📱"},
{title:"FOOD",content:"8PM = 50% discount 🍱"},
{title:"HIDDEN SPOTS",content:"Tokyo Gov Building free view 🏙️"}
];

const flipbook = $('#flipbook');

guideData.forEach(p=>{
flipbook.append(`
<div class="page">
<h2>${p.title}</h2>
<p>${p.content}</p>
</div>`);
});

// fill pages
for(let i=guideData.length;i<40;i++){
flipbook.append(`<div class="page"><h3>Notes...</h3></div>`);
}

// INIT
function openFlipbook(){
document.getElementById('flipModal').style.display='flex';

setTimeout(()=>{
$('#flipbook').turn({
width:800,
height:550,
autoCenter:true
});
},200);
}

function closeFlipbook(){
document.getElementById('flipModal').style.display='none';
$('#flipbook').turn('destroy');
}

// controls
$('#next-btn').click(()=>$('#flipbook').turn('next'));
$('#prev-btn').click(()=>$('#flipbook').turn('previous'));
</script>

</body>
</html>
